[package]
name = "sgx-qkms"
version = "0.1.0"
edition = "2024"

[dependencies]
toml = "1.0"
serde = "1.0"
qkd014_server_gen = { path = "api/qkd014-server-gen" }
async-trait = "0.1"
axum-extra = { version = "0.12", features = ["cookie"] }
headers = "0.4"
http = "1"
axum = "0.8"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }

[workspace]
members = ["api/qkd014-server-gen"]
